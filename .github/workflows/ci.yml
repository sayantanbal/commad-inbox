name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Dependency audit
        run: bun audit

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Unit tests
        run: bun test src/lib/__tests__

      - name: Agent eval fixtures
        run: bun run validate:agent-eval

      - name: Production build
        run: bun run build
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
          CORSAIR_KEK: dGVzdC1rZWstdmFsdWUtZm9yLWNpLW9ubHk=
          GOOGLE_CLIENT_ID: ci-client-id.apps.googleusercontent.com
          GOOGLE_CLIENT_SECRET: ci-client-secret
          BETTER_AUTH_SECRET: dGVzdC1hdXRoLXNlY3JldC1mb3ItY2k=
          BETTER_AUTH_URL: http://localhost:3000
          APP_URL: http://localhost:3000

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright Chromium
        run: bun run test:e2e:install

      - name: Playwright — agent approval harness
        run: bun run test:e2e
        env:
          CI: "1"
          E2E_TEST: "1"
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
          CORSAIR_KEK: dGVzdC1rZWstdmFsdWUtZm9yLWNpLW9ubHk=
          GOOGLE_CLIENT_ID: ci-client-id.apps.googleusercontent.com
          GOOGLE_CLIENT_SECRET: ci-client-secret
          BETTER_AUTH_SECRET: dGVzdC1hdXRoLXNlY3JldC1mb3ItY2k=
          BETTER_AUTH_URL: http://127.0.0.1:3000
          APP_URL: http://127.0.0.1:3000

  migrate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci -d ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run migrations on fresh database
        run: bun run db:migrate
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci

      - name: Assert outbound_attachments schema exists
        run: |
          bun -e "
          import postgres from 'postgres';
          const sql = postgres(process.env.DATABASE_URL, { max: 1 });
          const tables = await sql\`
            SELECT table_name FROM information_schema.tables
            WHERE table_schema = 'public' AND table_name = 'outbound_attachments'
          \`;
          if (tables.length !== 1) {
            console.error('outbound_attachments table missing after migrate');
            process.exit(1);
          }
          const cols = await sql\`
            SELECT column_name FROM information_schema.columns
            WHERE table_schema = 'public' AND table_name = 'scheduled_sends'
              AND column_name = 'attachment_ids'
          \`;
          if (cols.length !== 1) {
            console.error('scheduled_sends.attachment_ids column missing');
            process.exit(1);
          }
          await sql.end();
          console.log('✓ migration smoke: outbound_attachments + attachment_ids');
          "
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
